#Server port
server.port= 8900

#Application name
spring.application.name= api-gateway

#Client registration options :
eureka.client.service-url.defaultZone = http://localhost:8761/eureka

zuul.prefix=/api
zuul.ignored-services=*

# Map paths to services
#----------------------------------
# User service :
zuul.routes.userservice.path=/accounts/**
zuul.routes.userservice.service-id=user-service

# Catalog service :
zuul.routes.catalogservice.path=/catalog/**
zuul.routes.catalogservice.service-id=product-catalog-service

# Order service :
zuul.routes.orderservice.path=/shop/**
zuul.routes.orderservice.service-id=order-service

# Recommendation service :
zuul.routes.recommendationservice.path=/review/**
zuul.routes.recommendationservice.service-id=product-recommendation-service

# Cấu hình route cho Payment service qua Gateway
zuul.routes.paymentservice.path=/pay/**
zuul.routes.paymentservice.service-id=payment-service

# Category service :
zuul.routes.categoryservice.path=/categories/**
zuul.routes.categoryservice.service-id=category-service

# Promotion service :
zuul.routes.promotionservice.path=/promotions/**
zuul.routes.promotionservice.service-id=promotion-service
#SPRING SESSION & REDIS PROPERTIES :
#-------------------------------
spring.session.store-type=redis
spring.session.redis.namespace=session
spring.session.redis.flush-mode=on-save
spring.redis.host=localhost
spring.redis.port=6379

#SECURITY
#---------------------------------
zuul.sensitive-headers=

# Tăng thời gian chờ (timeout) cho Zuul và Ribbon lên 60 giây để chờ Upload ảnh
zuul.host.socket-timeout-millis=60000
zuul.host.connect-timeout-millis=60000
ribbon.ReadTimeout=60000
ribbon.ConnectTimeout=60000
hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds=60000
